# light-skill-runner 配置示例
# 优先级：默认值 < 本文件 < 环境变量

llm:
  provider: socrates-gw       # openai | ollama | llamacpp | socrates-gw
  base_url: https://socrates-llm-gw.jd.com/v1
  model: Qwen3.5-397B-A17B-FP8
  api_key: ""                 # 也可用环境变量 LLM_API_KEY
  force_tool_emulation: true  # 网关未确认原生 function-calling，默认走工具调用模拟

trace:
  exporters: [file, log, stream] # file=JSON 落盘, log=文本日志, stream=SSE 实时推送
  dir: ./traces
  log_dir: ./logs

server:
  port: 8080

tools:
  # 关闭工作目录沙箱：允许 read_file/write_file/run_script/run_command 访问任意路径。
  # 注意：这会让引擎获得与运行账户同等的文件/命令权限，风险自担。
  allow_arbitrary_paths: true
  command:
    enabled: true                # 注册 run_command 工具
    # 仅以下程序名（按 basename，不区分大小写）允许执行。空白名单=拒绝全部。
    whitelist: [cmd, powershell, pwsh, where, go, python, node, git, ls, dir, cat, type]
    timeout: 30s
    empty_whitelist_denies: true

prompts_dir: ./prompts        # 留空则使用内嵌默认提示词
skills_dir: ./skills
workdir: .
database_path: ./data/light-skill-runner.db
max_turns: 12
script_timeout: 60s
